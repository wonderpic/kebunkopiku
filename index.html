<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talaga Hangsa KopiPlanPro</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        body { background: #f4f7f4; color: #2c3e50; padding: 15px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        .header-box { margin-bottom: 20px; }
        .judul-utama { color: #1e3f20; font-weight: bold; font-size: 24px; }
        .sub-judul { color: #4a6b4c; font-size: 13px; margin-bottom: 15px; }
        .kartu { background: #ffffff; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; text-align: left; }
        h2 { font-size: 16px; color: #1e3f20; margin-bottom: 10px; border-bottom: 2px solid #e6ebe6; padding-bottom: 5px; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 3px; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
        .btn { width: 100%; background: #1e3f20; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .item-kebun { padding: 10px; background: #fafafa; border-left: 4px solid #4e3629; margin-bottom: 8px; border-radius: 4px; font-size: 13px; }
        .btn-del { background: #d9534f; color: white; border: none; padding: 2px 6px; font-size: 11px; border-radius: 3px; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <div class="judul-utama">Talaga Hangsa KopiPlanPro</div>
        <div class="sub-judul">Asisten Digital Perawatan Kebun Kopi</div>
    </div>

    <!-- BAGIAN 1: FORM INPUT -->
    <div class="kartu">
        <h2>🌱 Tambah Blok Kebun</h2>
        <form id="formKopi" onsubmit="tambahData(event)">
            <div class="form-group">
                <label>Nama Blok</label>
                <input type="text" id="inpBlok" required placeholder="Contoh: Blok A">
            </div>
            <div class="form-group">
                <label>Varietas Kopi</label>
                <select id="inpVarietas">
                    <option value="Arabika">Arabika</option>
                    <option value="Robusta">Robusta</option>
                </select>
            </div>
            <div class="form-group">
                <label>Jumlah Pohon</label>
                <input type="number" id="inpPohon" required value="100" min="1">
            </div>
            <button type="submit" class="btn">⚡ Simpan Data</button>
        </form>
    </div>

    <!-- BAGIAN 2: RINGKASAN DATA KEBUN -->
    <div class="kartu">
        <h2>📊 Ringkasan Kebun Anda</h2>
        <div id="displayKebun"></div>
    </div>
</div>

<script>
    // Membaca data tersimpan di HP
    let databaseLokal = JSON.parse(localStorage.getItem('kopi_db_statis')) || [];

    function tambahData(e) {
        e.preventDefault();
        
        const dataBaru = {
            blok: document.getElementById('inpBlok').value,
            varietas: document.getElementById('inpVarietas').value,
            pohon: document.getElementById('inpPohon').value
        };

        databaseLokal.push(dataBaru);
        localStorage.setItem('kopi_db_statis', JSON.stringify(databaseLokal));
        
        document.getElementById('formKopi').reset();
        tampilkanData();
    }

    function hapusData(index) {
        databaseLokal.splice(index, 1);
        localStorage.setItem('kopi_db_statis', JSON.stringify(databaseLokal));
        tampilkanData();
    }

    function tampilkanData() {
        const wadah = document.getElementById('displayKebun');
        wadah.innerHTML = "";

        if (databaseLokal.length === 0) {
            wadah.innerHTML = "<p style='color:#7f8c8d; font-size:13px;'>Belum ada data kebun tersimpan.</p>";
            return;
        }

        databaseLokal.forEach((item, idx) => {
            wadah.innerHTML += `
                <div class="item-kebun">
                    <b>Blok:</b> ${item.blok} | <b>Varietas:</b> Kopi ${item.varietas} | <b>Populasi:</b> ${item.pohon} Pohon<br>
                    <button class="btn-del" onclick="hapusData(${idx})">🗑️ Hapus</button>
                </div>
            `;
        });
    }

    // Jalankan render otomatis saat pertama kali dibuka
    tampilkanData();
</script>

</body>
</html>
